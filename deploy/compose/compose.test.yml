name: nextbuf-test

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: nextbuf_test
      POSTGRES_USER: nextbuf
      POSTGRES_PASSWORD: nextbuf_test
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextbuf -d nextbuf_test"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:56379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
