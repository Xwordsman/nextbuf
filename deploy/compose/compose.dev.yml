name: nextbuf-dev

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: nextbuf
      POSTGRES_USER: nextbuf
      POSTGRES_PASSWORD: nextbuf
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - nextbuf_dev_postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextbuf -d nextbuf"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - nextbuf_dev_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:v1.30.4
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_MAX_MESSAGES: "500"
      MP_DATABASE: /data/mailpit.db
    volumes:
      - nextbuf_dev_mailpit:/data

volumes:
  nextbuf_dev_postgres:
  nextbuf_dev_redis:
  nextbuf_dev_mailpit:
