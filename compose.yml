name: nextbuf

x-nextbuf-app: &nextbuf-app
  image: ${NEXTBUF_IMAGE:?Set NEXTBUF_IMAGE}:${NEXTBUF_VERSION:?Set NEXTBUF_VERSION}
  env_file:
    - ${NEXTBUF_ENV_FILE:-.env}
  environment:
    NODE_ENV: production
    DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    STORAGE_LOCAL_PATH: /app/data/uploads
  volumes:
    - nextbuf_uploads:/app/data/uploads
  networks:
    - nextbuf
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "5"

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - nextbuf_postgres:/var/lib/postgresql
    networks:
      - nextbuf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - sh
      - -ec
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    volumes:
      - nextbuf_redis:/data
    networks:
      - nextbuf
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG']
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  setup:
    <<: *nextbuf-app
    profiles: [tools]
    command: ["setup"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    <<: *nextbuf-app
    command:
      - sh
      - -ec
      - |
        node dist/cli/index.mjs setup
        node dist/cli/index.mjs preflight web
        exec node scripts/start-standalone.mjs
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - 127.0.0.1:${WEB_PORT:-3000}:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    <<: *nextbuf-app
    command: ["worker"]
    restart: unless-stopped
    stop_grace_period: 45s
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://web:3000/health/worker').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  migrate:
    <<: *nextbuf-app
    profiles: [tools]
    command: ["migrate"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  doctor:
    <<: *nextbuf-app
    profiles: [tools]
    command: ["doctor"]
    restart: "no"

networks:
  nextbuf:

volumes:
  nextbuf_postgres:
  nextbuf_redis:
  nextbuf_uploads:
