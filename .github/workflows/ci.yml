name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Verify DCO sign-offs
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const signoff = /^Signed-off-by:\s+.+\s+<[^>]+>\s*$/im;
            const unsigned = commits.filter((commit) => !signoff.test(commit.commit.message));
            if (unsigned.length > 0) {
              core.setFailed(`Missing DCO sign-off: ${unsigned.map((commit) => commit.sha.slice(0, 12)).join(', ')}`);
            }

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nextbuf:nextbuf_test@127.0.0.1:5432/nextbuf_test
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_PREFIX: nextbuf_ci
      RUN_INTEGRATION_TESTS: "true"

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: nextbuf_test
          POSTGRES_USER: nextbuf
          POSTGRES_PASSWORD: nextbuf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nextbuf -d nextbuf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate development and test Compose files
        run: |
          docker compose -f deploy/compose/compose.dev.yml config --quiet
          docker compose -f deploy/compose/compose.test.yml config --quiet

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Apply database migrations
        run: pnpm db:deploy

      - name: Integration test
        run: pnpm test:integration

      - name: Build
        run: pnpm build
