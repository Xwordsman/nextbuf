name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Verify DCO sign-offs
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const signoff = /^Signed-off-by:\s+.+\s+<[^>]+>\s*$/im;
            const unsigned = commits.filter((commit) => !signoff.test(commit.commit.message));
            if (unsigned.length > 0) {
              core.setFailed(`Missing DCO sign-off: ${unsigned.map((commit) => commit.sha.slice(0, 12)).join(', ')}`);
            }

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nextbuf:nextbuf_test@127.0.0.1:5432/nextbuf_test
      REDIS_URL: redis://127.0.0.1:6379/0
      REDIS_PREFIX: nextbuf_ci
      RUN_INTEGRATION_TESTS: "true"
      APP_URL: http://127.0.0.1:3000
      AUTH_SECRET: nextbuf-ci-auth-secret-at-least-32-characters
      AUTH_REGISTRATION_MODE: open
      MAIL_PAYLOAD_KEY: SoxCSq6+35KG9qqH7JHtneowihiWs8hjtqqI37UhPQw=
      SMTP_HOST: 127.0.0.1
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: NextBuf CI <noreply@nextbuf.test>
      MAILPIT_API_URL: http://127.0.0.1:8025

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: nextbuf_test
          POSTGRES_USER: nextbuf
          POSTGRES_PASSWORD: nextbuf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nextbuf -d nextbuf_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      mailpit:
        image: axllent/mailpit:v1.30.4
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "/mailpit readyz"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit:prod

      - name: Validate development and test Compose files
        run: |
          docker compose -f deploy/compose/compose.dev.yml config --quiet
          docker compose -f deploy/compose/compose.test.yml config --quiet
          NEXTBUF_ENV_FILE=.env.example docker compose --env-file .env.example -f compose.yml config --quiet

      - name: Validate deployment shell scripts
        run: |
          sh -n nextbufctl
          sh -n deploy/docker/entrypoint.sh
          sh -n deploy/bin/nextbuf
          sh -n deploy/bin/nextbuf-service
          sh -n tests/smoke/docker-smoke.sh

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Apply database migrations
        run: pnpm db:deploy

      - name: Integration test
        run: pnpm test:integration

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end test
        run: pnpm test:e2e

  image-smoke:
    if: github.event_name != 'pull_request'
    needs: check
    name: image-smoke (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON((startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '[{"architecture":"amd64","platform":"linux/amd64","runner":"ubuntu-latest"},{"architecture":"arm64","platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]' || '[{"architecture":"amd64","platform":"linux/amd64","runner":"ubuntu-latest"}]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve application version
        id: version
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF" == refs/tags/v* ]] && [[ "${GITHUB_REF_NAME#v}" != "$version" ]]; then
            echo "::error::Tag version ${GITHUB_REF_NAME#v} does not match package version $version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image once for this architecture
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ startsWith(github.ref, 'refs/tags/v') && format('ghcr.io/xwordsman/nextbuf:{0}-{1}', steps.version.outputs.version, matrix.architecture) || format('nextbuf-smoke:{0}', steps.version.outputs.version) }}
          build-args: |
            NEXTBUF_VERSION=${{ steps.version.outputs.version }}
            NEXTBUF_COMMIT=${{ github.sha }}
            NEXTBUF_BUILD_TIME=${{ github.event.repository.updated_at }}
          cache-from: type=gha,scope=image-${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.architecture }}
          provenance: ${{ startsWith(github.ref, 'refs/tags/v') && 'mode=max' || 'false' }}
          sbom: ${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Load published architecture image for smoke tests
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          image="ghcr.io/xwordsman/nextbuf:${{ steps.version.outputs.version }}-${{ matrix.architecture }}"
          docker pull "$image"
          docker tag "$image" "nextbuf-smoke:${{ steps.version.outputs.version }}"

      - name: Run Compose, first-admin and recovery smoke tests
        env:
          NEXTBUF_SMOKE_VERSION: ${{ steps.version.outputs.version }}
          RUN_RESTORE: ${{ matrix.architecture == 'amd64' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '1' || '0' }}
        run: |
          chmod +x nextbufctl tests/smoke/docker-smoke.sh
          timeout --signal=TERM --kill-after=30s 20m tests/smoke/docker-smoke.sh "${{ matrix.architecture }}"

  archive-build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build and smoke-test release archive
        run: |
          version="${GITHUB_REF_NAME#v}"
          pnpm release:archive "$version" release
          tar -xzf "release/nextbuf-$version-linux-x64.tar.gz" -C release
          test "$("release/nextbuf-$version/runtime/deploy/bin/nextbuf" version)" = "$version"
          test -f "release/nextbuf-$version/deploy/systemd/nextbuf-web.service"
          test -f "release/nextbuf-$version/deploy/pm2/ecosystem.config.cjs"

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: release/nextbuf-${{ github.ref_name }}-sbom.spdx.json

      - name: Upload verified release files
        uses: actions/upload-artifact@v4
        with:
          name: nextbuf-release-${{ github.ref_name }}
          path: |
            release/*.tar.gz
            release/*.sha256
            release/*.spdx.json
          if-no-files-found: error
          retention-days: 1

  publish-image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: image-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish tested multi-architecture manifest
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          image=ghcr.io/xwordsman/nextbuf
          docker buildx imagetools create \
            -t "$image:$version" \
            -t "$image:latest" \
            "$image:$version-amd64" \
            "$image:$version-arm64"
          docker buildx imagetools inspect "$image:$version"

  release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [archive-build, publish-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download verified release files
        uses: actions/download-artifact@v4
        with:
          name: nextbuf-release-${{ github.ref_name }}
          path: release

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.sha256
            release/*.spdx.json
